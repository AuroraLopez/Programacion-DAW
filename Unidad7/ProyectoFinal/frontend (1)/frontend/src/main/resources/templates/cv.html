<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoMarket</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-gray-100">
    <div th:replace="~{fragments/navbar.html :: menu}"></div>

    <main class="container mx-auto p-10">
        <div id="cv-card" class="max-w-3xl mx-auto bg-white text-gray-800 p-8 rounded-xl shadow-2xl">
            <p class="text-center text-gray-500">Cargando perfil profesional...</p>
        </div>
    </main>

    <script>
        // URL base de tu PersonaController
        const API_URL_PERSONA = "http://localhost:8082/persona";

        // Función aincrona para usar la url base de la persona
        async function cargarCV(url = API_URL_PERSONA) {
            try {
                // Realiza la petición al backend
                const res = await fetch(url);
                const personas = await res.json();
                const card = document.getElementById('cv-card');

                // Mapeamos la lista de personas (List<Persona>) recibida del Service
                card.innerHTML = personas.map(p => {
                    return `
                        <div class="border-b-4 border-indigo-600 pb-4 mb-6">
                            <h1 class="text-5xl font-black text-gray-900 uppercase">
                                ${p.nombre} <span class="text-indigo-600">${p.apellido1} ${p.apellido2}</span>
                            </h1>
                            <p class="text-lg text-indigo-500 font-bold mt-2 italic">Desarrollador de Software</p>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                            <div class="md:col-span-2">
                                <section class="mb-8">
                                    <h2 class="text-2xl font-bold text-gray-800 mb-3 flex items-center">
                                        <span class="bg-indigo-600 w-2 h-6 mr-3"></span> Sobre Mí
                                    </h2>
                                    <p class="text-gray-600 leading-relaxed text-justify">
                                        ${p.descripcion || 'Sin descripción disponible.'}
                                    </p>
                                </section>

                                <section>
                                    <h2 class="text-2xl font-bold text-gray-800 mb-3 flex items-center">
                                        <span class="bg-indigo-600 w-2 h-6 mr-3"></span> Formación Académica
                                    </h2>
                                    <div class="bg-gray-50 p-4 rounded-lg border-l-4 border-indigo-400">
                                        <p class="text-gray-700 whitespace-pre-line">${p.formacion || 'No hay formación registrada.'}</p>
                                    </div>
                                </section>
                            </div>

                            <div class="bg-indigo-50 p-6 rounded-lg h-fit shadow-inner">
                                <h2 class="text-xl font-bold text-indigo-900 mb-4 border-b border-indigo-200 pb-2 text-center">Contacto</h2>
                                <div class="space-y-4">
                                    <p class="text-gray-700 break-words text-center font-medium">${p.contacto || 'Información de contacto no disponible'}</p>
                                </div>
                            </div>
                        </div>

                        <section class="mt-8">
                            <h2 class="text-2xl font-bold text-gray-800 mb-4 flex items-center">
                                <span class="bg-indigo-600 w-2 h-6 mr-3"></span> Idiomas
                            </h2>
                            <div class="space-y-4">
                                <div>
                                    <div class="flex justify-between mb-1">
                                        <span class="text-base font-medium text-indigo-700">Inglés</span>
                                        <span class="text-sm font-medium text-indigo-700">B1 / B2 (Nivel Técnico)</span>
                                    </div>
                                    <div class="w-full bg-gray-200 rounded-full h-2.5">
                                        <div class="bg-indigo-600 h-2.5 rounded-full" style="width: 70%"></div>
                                     </div>
                            </div>

                            <div>
                                <div class="flex justify-between mb-1">
                                    <span class="text-base font-medium text-gray-700">Francés</span>
                                    <span class="text-sm font-medium text-gray-700">Básico</span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-2.5">
                                    <div class="bg-gray-400 h-2.5 rounded-full" style="width: 25%"></div>
                                </div>
                            </div>
        
                            <div>
                                <div class="flex justify-between mb-1">
                                    <span class="text-base font-medium text-gray-700">Español</span>
                                    <span class="text-sm font-medium text-gray-700">Nativo</span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-2.5">
                                    <div class="bg-indigo-400 h-2.5 rounded-full" style="width: 100%"></div>
                                </div>
                            </div>
                        </div>  
                    </section>
                    `;
                }).join(''); // Unimos en caso de que existan varios perfiles en la lista
            } catch (error) {
                console.error("Error al cargar el CV:", error);
                document.getElementById('cv-card').innerHTML =
                    '<p class="text-center text-red-500 font-bold">Error al conectar con el servidor de perfiles.</p>';
            }
        }

        // Ejecutar la carga al iniciar la página
        window.onload = () => cargarCV();
    </script>
</body>

</html>
